<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="STYLED" />
  <meta name="theme-color" content="#FAF7F2" />
  <title>STYLED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #FAF7F2;
      --cream-dark: #F3EDE5;
      --white: #FFFFFF;
      --pink-deep: #C9919A;
      --pink-mid: #DDB8BE;
      --pink-light: #EDD5D8;
      --pink-pale: #FBF0F1;
      --pink-glow: #F9E8EA;
      --mauve: #B5878F;
      --brown-dark: #2A2323;
      --brown-mid: #6B5757;
      --brown-light: #9C8A8A;
      --border: #EAE0DA;
      --border-light: #F2EBE6;
      --shadow-sm: 0 1px 8px rgba(45,35,35,0.06);
      --shadow-md: 0 4px 20px rgba(45,35,35,0.10);
      --shadow-lg: 0 8px 32px rgba(45,35,35,0.14);
      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --nav-height: 76px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--cream);color:var(--brown-dark);min-height:100dvh;max-width:430px;margin:0 auto;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    #app{min-height:100dvh;display:flex;flex-direction:column}
    .font-display{font-family:'Cormorant Garamond',Georgia,serif}
    .wordmark{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--brown-dark)}
    .label{font-size:0.7rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--brown-light)}
    .caption{font-size:0.78rem;color:var(--brown-light);line-height:1.4}
    .body-sm{font-size:0.88rem;line-height:1.5}
    .screen{flex:1;overflow-y:auto;padding-bottom:calc(var(--nav-height)+16px);padding-top:env(safe-area-inset-top,0px)}
    .screen::-webkit-scrollbar{display:none}
    .px{padding-left:20px;padding-right:20px}
    .pt-header{padding-top:60px}
    .app-header{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:16px 20px 12px;padding-top:calc(env(safe-area-inset-top,0px) + 16px);background:rgba(250,247,242,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:100;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light)}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:var(--nav-height);padding-bottom:env(safe-area-inset-bottom,0px);background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-around;padding-top:10px;z-index:100}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 6px;border-radius:var(--radius-sm);transition:all 0.2s ease;border:none;background:none;color:var(--brown-light);flex:1}
    .nav-item.active{color:var(--pink-deep)}
    .nav-item svg{width:20px;height:20px;stroke-width:1.6;transition:transform 0.2s ease}
    .nav-item.active svg{transform:scale(1.08)}
    .nav-label{font-size:0.58rem;font-weight:500;letter-spacing:0.03em}
    .nav-dot{width:4px;height:4px;border-radius:50%;background:var(--pink-deep);margin-top:-2px}
    .card{background:var(--white);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:1px solid var(--border-light);overflow:hidden}
    .card-pink{background:linear-gradient(135deg,var(--pink-glow) 0%,#FDF5F6 100%);border:1px solid var(--pink-light)}
    .card-cream{background:var(--cream-dark);border:1px solid var(--border)}
    .btn-primary{background:linear-gradient(135deg,var(--pink-deep) 0%,var(--mauve) 100%);color:white;border:none;cursor:pointer;padding:14px 28px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;letter-spacing:0.04em;box-shadow:0 4px 16px rgba(201,145,154,0.35);transition:all 0.2s ease}
    .btn-primary:active{transform:scale(0.97)}
    .btn-secondary{background:var(--white);color:var(--brown-dark);border:1.5px solid var(--border);cursor:pointer;padding:12px 24px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;transition:all 0.2s ease}
    .btn-secondary:active{background:var(--cream-dark)}
    .btn-ghost{background:none;border:none;cursor:pointer;color:var(--brown-light);padding:8px;border-radius:50%;transition:all 0.2s ease}
    .btn-ghost:active{background:var(--cream-dark)}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:50px;font-size:0.8rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--brown-mid);transition:all 0.18s ease;white-space:nowrap}
    .chip.active{background:var(--pink-deep);color:white;border-color:var(--pink-deep)}
    .chip.sm{padding:5px 11px;font-size:0.74rem}
    .fab{position:fixed;bottom:calc(var(--nav-height) + env(safe-area-inset-bottom,0px) + 16px);right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--pink-deep),var(--mauve));color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(201,145,154,0.45);transition:all 0.2s ease;z-index:90;font-size:1.5rem}
    .fab:active{transform:scale(0.93)}
    .input{width:100%;padding:13px 16px;background:var(--cream);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--brown-dark);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s}
    .input:focus{border-color:var(--pink-mid)}
    .input::placeholder{color:var(--brown-light)}
    .input-label{font-size:0.78rem;font-weight:600;color:var(--brown-mid);margin-bottom:6px;display:block}
    .input-group{margin-bottom:18px}
    .search-bar{display:flex;align-items:center;gap:10px;background:var(--white);border:1.5px solid var(--border);border-radius:50px;padding:10px 16px}
    .search-bar input{flex:1;border:none;background:none;outline:none;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--brown-dark)}
    .search-bar input::placeholder{color:var(--brown-light)}
    .overlay{position:fixed;inset:0;z-index:200;background:rgba(42,35,35,0.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .bottom-sheet{width:100%;max-width:430px;background:var(--white);border-radius:28px 28px 0 0;max-height:93dvh;overflow-y:auto;animation:slideUp 0.32s cubic-bezier(0.34,1.2,0.64,1);padding-bottom:env(safe-area-inset-bottom,20px)}
    .bottom-sheet::-webkit-scrollbar{display:none}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0}
    .sheet-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light)}
    .sheet-title{font-size:1rem;font-weight:600}
    .sheet-body{padding:20px}
    .item-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .item-card{background:var(--white);border-radius:var(--radius-md);border:1px solid var(--border-light);overflow:hidden;cursor:pointer;transition:all 0.18s ease}
    .item-card:active{transform:scale(0.97);box-shadow:var(--shadow-md)}
    .item-img-wrap{width:100%;aspect-ratio:1;background:var(--cream-dark);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .item-img-wrap img{width:100%;height:100%;object-fit:cover}
    .item-img-placeholder{font-size:2.2rem}
    .item-card-body{padding:10px 12px 12px}
    .item-card-name{font-size:0.84rem;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .item-card-meta{font-size:0.72rem;color:var(--brown-light);display:flex;align-items:center;gap:6px}
    .color-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,0.1);flex-shrink:0}
    .item-worn-badge{position:absolute;top:8px;right:8px;background:rgba(255,255,255,0.9);border-radius:50px;padding:2px 8px;font-size:0.65rem;font-weight:600;color:var(--brown-mid)}
    .color-grid{display:flex;flex-wrap:wrap;gap:8px}
    .swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all 0.15s;flex-shrink:0;position:relative}
    .swatch.selected{border-color:var(--brown-dark);transform:scale(1.18)}
    .swatch.white-border{border-color:var(--border)}
    .swatch-special{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;color:var(--brown-mid);transition:all 0.15s;background:var(--white)}
    .swatch-special.selected{border-color:var(--pink-deep);color:var(--pink-deep);background:var(--pink-pale)}
    .detail-overlay{position:fixed;inset:0;z-index:200;background:var(--cream);overflow-y:auto;animation:slideIn 0.3s ease}
    .detail-overlay::-webkit-scrollbar{display:none}
    @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .detail-tags{display:flex;flex-wrap:wrap;gap:6px}
    .detail-tag{background:var(--pink-pale);color:var(--pink-deep);border-radius:50px;padding:4px 12px;font-size:0.76rem;font-weight:500}
    .detail-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border-light)}
    .detail-row:last-child{border-bottom:none}
    .detail-row-label{font-size:0.78rem;color:var(--brown-light)}
    .detail-row-value{font-size:0.88rem;font-weight:500;text-align:right}
    .step-dots{display:flex;gap:6px;justify-content:center;padding:8px 0}
    .step-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all 0.2s}
    .step-dot.active{width:20px;border-radius:3px;background:var(--pink-deep)}
    .stat-card{background:var(--white);border-radius:var(--radius-md);border:1px solid var(--border-light);padding:16px;text-align:center;flex:1}
    .stat-number{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:500;color:var(--brown-dark);line-height:1}
    .stat-label{font-size:0.72rem;color:var(--brown-light);margin-top:4px;font-weight:500}
    .bubble-ai{background:var(--white);border:1px solid var(--border-light);border-radius:18px 18px 18px 4px;padding:12px 16px;max-width:85%;box-shadow:var(--shadow-sm);font-size:0.9rem;line-height:1.55}
    .bubble-user{background:linear-gradient(135deg,var(--pink-deep),var(--mauve));color:white;border-radius:18px 18px 4px 18px;padding:12px 16px;max-width:85%;margin-left:auto;font-size:0.9rem;line-height:1.55}
    .chat-input-bar{position:fixed;bottom:var(--nav-height);left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:12px 16px;background:rgba(250,247,242,0.95);backdrop-filter:blur(16px);border-top:1px solid var(--border-light);display:flex;gap:10px;align-items:flex-end}
    .chat-input-bar textarea{flex:1;border:1.5px solid var(--border);border-radius:20px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:0.9rem;background:var(--white);resize:none;outline:none;max-height:100px;color:var(--brown-dark);transition:border-color 0.2s}
    .chat-input-bar textarea:focus{border-color:var(--pink-mid)}
    .chat-send{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--pink-deep),var(--mauve));color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
    .chat-send:active{transform:scale(0.92)}
    .discover-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .discover-card{background:var(--white);border-radius:var(--radius-md);border:1px solid var(--border-light);padding:20px 16px;cursor:pointer;transition:all 0.2s ease;overflow:hidden;position:relative}
    .discover-card:active{transform:scale(0.97)}
    .discover-card.wide{grid-column:span 2}
    .discover-card .icon{font-size:1.8rem;margin-bottom:10px;display:block}
    .discover-card .title{font-size:0.88rem;font-weight:600;color:var(--brown-dark);margin-bottom:4px}
    .discover-card .desc{font-size:0.76rem;color:var(--brown-light);line-height:1.4}
    .discover-card .badge{position:absolute;top:12px;right:12px;background:var(--pink-light);color:var(--mauve);font-size:0.65rem;font-weight:600;letter-spacing:0.06em;padding:2px 8px;border-radius:50px;text-transform:uppercase}
    .settings-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border-light);cursor:pointer}
    .settings-row:last-child{border-bottom:none}
    .settings-row .row-left{display:flex;align-items:center;gap:12px}
    .settings-row .row-icon{width:36px;height:36px;border-radius:10px;background:var(--pink-pale);display:flex;align-items:center;justify-content:center;font-size:1rem}
    .settings-row .row-title{font-size:0.9rem;font-weight:500}
    .settings-row .row-subtitle{font-size:0.78rem;color:var(--brown-light)}
    .toggle{width:44px;height:24px;border-radius:12px;background:var(--border);position:relative;cursor:pointer;transition:background 0.2s;border:none;flex-shrink:0}
    .toggle.on{background:var(--pink-deep)}
    .toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:white;top:3px;left:3px;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
    .toggle.on::after{transform:translateX(20px)}
    .weather-strip{background:linear-gradient(135deg,#E8D5F0 0%,var(--pink-light) 100%);border-radius:var(--radius-md);padding:14px 18px;display:flex;align-items:center;gap:12px;border:1px solid rgba(201,145,154,0.2)}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .section-title{font-size:1rem;font-weight:600;color:var(--brown-dark)}
    .section-link{font-size:0.8rem;color:var(--pink-deep);font-weight:500;cursor:pointer;background:none;border:none}
    .avatar-circle{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--pink-light),var(--pink-mid));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:500;color:var(--mauve);border:3px solid var(--white);box-shadow:0 4px 16px rgba(201,145,154,0.3)}
    .chips-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
    .chips-row::-webkit-scrollbar{display:none}
    .coming-soon{display:inline-flex;align-items:center;gap:4px;font-size:0.7rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--pink-deep);background:var(--pink-pale);padding:3px 10px;border-radius:50px}
    .empty-state{text-align:center;padding:48px 24px}
    .empty-icon{font-size:3rem;margin-bottom:16px}
    .empty-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400;margin-bottom:8px}
    .empty-body{font-size:0.88rem;color:var(--brown-light);line-height:1.6;margin-bottom:24px}
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .animate-in{animation:fadeSlideUp 0.35s ease forwards}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
    .pulse{animation:pulse 2s ease infinite}
    .bg-removing{position:absolute;inset:0;background:rgba(250,247,242,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-size:0.82rem;font-weight:500;color:var(--brown-mid)}
    .spinner{width:28px;height:28px;border:2.5px solid var(--pink-light);border-top-color:var(--pink-deep);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/background-removal.js"></script>
</head>

let _db = null;
const openLocalDB = () => new Promise((resolve, reject) => {
  if (_db) return resolve(_db);
  const req = indexedDB.open(DB_NAME, DB_VER);
  req.onupgradeneeded = e => {
    const db = e.target.result;
    if (!db.objectStoreNames.contains('items')) {
      const s = db.createObjectStore('items', {
        keyPath: 'id'
      });
      s.createIndex('category', 'category');
      s.createIndex('color', 'color');
    }
    if (!db.objectStoreNames.contains('outfits')) db.createObjectStore('outfits', {
      keyPath: 'id'
    });
    if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', {
      keyPath: 'key'
    });
    if (!db.objectStoreNames.contains('packingLists')) db.createObjectStore('packingLists', {
      keyPath: 'id'
    });
    if (!db.objectStoreNames.contains('wishlist')) db.createObjectStore('wishlist', {
      keyPath: 'id'
    });
  };
  req.onsuccess = () => {
    _db = req.result;
    resolve(_db);
  };
  req.onerror = () => reject(req.error);
});

  const db = await openLocalDB();

    req.onerror = () => rej(req.error);
  });
};
const compressImage = (file, maxPx = 900) => new Promise(resolve => {
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    let {
      width: w,
      height: h
    } = img;
    if (w > maxPx || h > maxPx) {
      if (w > h) {
        h = Math.round(h * maxPx / w);
        w = maxPx;
      } else {
        w = Math.round(w * maxPx / h);
        h = maxPx;
      }
    }
    const c = document.createElement('canvas');
    c.width = w;
    c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    resolve(c.toDataURL('image/jpeg', 0.88));
  };
  img.src = url;
});
